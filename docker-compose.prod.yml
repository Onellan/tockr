# Production Docker Compose for Tockr.
# Uses the published GitHub Container Registry image — no local build required.
#
# Pull latest image:
#   docker compose -f docker-compose.prod.yml pull
#
# Start (first run and updates):
#   docker compose -f docker-compose.prod.yml up -d
#
# The session secret and bootstrap admin password are auto-generated on first
# start and stored in the tockr-data volume so they persist across restarts and
# upgrades.

services:
  tockr:
    image: ghcr.io/onellan/tockr:latest
    ports:
      - "8029:8080"
    environment:
      TOCKR_ADDR: ":8080"
      TOCKR_DB_PATH: "/app/data/tockr.db"
      TOCKR_DATA_DIR: "/app/data"
      # Session secret and admin bootstrap password are auto-generated on first
      # start and persisted in the data volume. You can override them here if
      # you have existing values.
      # TOCKR_SESSION_SECRET: ""
      # TOCKR_ADMIN_PASSWORD: ""
      TOCKR_ADMIN_EMAIL: "admin@example.com"
      TOCKR_DEFAULT_TIMEZONE: "Africa/Johannesburg"
      TOCKR_DEFAULT_CURRENCY: "ZAR"
      TOCKR_FUTURE_TIME_POLICY: "end_of_day"
      TOCKR_TOTP_MODE: "disabled"
      # Set TOCKR_COOKIE_SECURE=true when running behind HTTPS.
      # TOCKR_COOKIE_SECURE: "true"
      # Email/password reset delivery. Keep credentials in your deployment
      # secret store rather than committing them here.
      # TOCKR_PUBLIC_URL: "https://tockr.example.com"
      # TOCKR_SMTP_HOST: "smtp.example.com"
      # TOCKR_SMTP_PORT: "587"
      # TOCKR_SMTP_FROM: "Tockr <noreply@example.com>"
      # TOCKR_SMTP_USERNAME: ""
      # TOCKR_SMTP_PASSWORD: ""
      # TOCKR_SMTP_STARTTLS: "true"
    volumes:
      - tockr-data:/app/data
    restart: unless-stopped

volumes:
  tockr-data:
