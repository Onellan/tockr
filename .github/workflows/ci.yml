name: CI

'on':
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - docs/**
      - deployment/**
  push:
    branches:
      - main
    tags:
      - v*.*.*
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_CACHE_SCOPE: tockr

jobs:
  validate:
    name: Validate Go application
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and run test container
        run: docker compose run --build --rm test

  security:
    name: Security checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run Gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          "$(go env GOPATH)/bin/gosec" ./...

      - name: Run go vet
        run: go vet ./...

      - name: Check go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum || (echo "go.mod/go.sum not tidy" && exit 1)

      - name: Run Govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  container-smoke:
    name: Build and smoke test container
    runs-on: ubuntu-latest
    needs: [validate, security]
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build local smoke-test image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          platforms: linux/amd64
          tags: tockr:ci-smoke
          cache-from: type=gha,scope=${{ env.IMAGE_CACHE_SCOPE }}
          cache-to: type=gha,mode=max,scope=${{ env.IMAGE_CACHE_SCOPE }}

      - name: Run container health check
        run: |
          set -euo pipefail
          docker run -d --name tockr-smoke \
            -p 18080:8080 \
            -e TOCKR_ADMIN_EMAIL=admin@example.com \
            tockr:ci-smoke
          trap 'docker logs tockr-smoke || true; docker rm -f tockr-smoke || true' EXIT

          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:18080/healthz; then
              break
            fi
            sleep 1
          done

          if ! curl -fsS http://127.0.0.1:18080/healthz; then
            echo "Container did not become healthy in time"
            exit 1
          fi

          test "$(docker inspect --format='{{.State.Health.Status}}' tockr-smoke)" != "unhealthy"
          test -n "$(docker exec tockr-smoke cat /app/data/.session_secret)"
          admin_password="$(docker exec tockr-smoke cat /app/data/.admin_password)"
          test "${#admin_password}" -ge 24

          curl -fsS -i -X POST http://127.0.0.1:18080/login \
            -H 'Content-Type: application/x-www-form-urlencoded' \
            --data-urlencode 'email=admin@example.com' \
            --data-urlencode "password=${admin_password}" | grep -q 'HTTP/1.1 303'

  docker-image:
    name: Build and publish Docker image
    runs-on: ubuntu-latest
    needs: container-smoke
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set image name
        id: image
        run: echo "name=${REGISTRY}/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build multi-platform image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/arm/v6
          push: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ env.IMAGE_CACHE_SCOPE }}
          cache-to: type=gha,mode=max,scope=${{ env.IMAGE_CACHE_SCOPE }}
