services:
  test:
    build:
      context: .
      target: test-runner
    image: tockr:test
    profiles:
      - test
    command: go test ./...

  tockr:
    build: .
    image: tockr:local
    ports:
      - 8029:8080
    environment:
      TOCKR_ADDR: :8080
      TOCKR_DB_PATH: /app/data/tockr.db
      TOCKR_DATA_DIR: /app/data
      # TOCKR_SESSION_SECRET and TOCKR_ADMIN_PASSWORD are auto-generated and
      # persisted in the volume on first start when not set explicitly.
      TOCKR_ADMIN_EMAIL: admin@example.com
      TOCKR_DEFAULT_TIMEZONE: UTC
      TOCKR_DEFAULT_CURRENCY: ZAR
      TOCKR_FUTURE_TIME_POLICY: end_of_day
      TOCKR_TOTP_MODE: disabled
      TOCKR_PUBLIC_URL: http://localhost:8029
      TOCKR_SMTP_HOST: mailpit
      TOCKR_SMTP_PORT: 1025
      TOCKR_SMTP_FROM: Tockr <noreply@localhost>
      TOCKR_SMTP_STARTTLS: "false"
    volumes:
      - tockr-data:/app/data
    depends_on:
      - mailpit
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - 1025:1025
      - 8025:8025
    restart: unless-stopped

volumes:
  tockr-data:
